<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en el sistema</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            width: 100%;
            max-width: 900px;
            /* Ancho máximo del contenedor */
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border: 1px solid #dddddd;
            border-radius: 5px;
        }

        .title {
            font-size: 26px;
            /* Tamaño del título */
            font-weight: bold;
            color: #003366;
            /* Color del título */
            margin-bottom: 10px;
            text-align: center;
        }

        .section {
            margin-bottom: 20px;
        }

        .section p {
            font-size: 14px;
            /* Tamaño del texto del párrafo */
            color: #333333;
            /* Color del texto del párrafo */
            line-height: 1.6;
            margin: 0;
        }

        .footer {
            font-size: 12px;
            /* Tamaño del texto del pie de página */
            color: #999999;
            text-align: center;
            margin-top: 20px;
        }

        .footer a {
            color: #0066cc;
            text-decoration: none;
        }

        .button-container {
            text-align: center;
            margin-top: 30px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #066ab2;
            color: #ffffff;
            text-align: center;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #054a8c;
        }

        .additional-logos {
            text-align: center;
            margin-top: 30px;
            gap: 20px;
            margin-top: 20px;
        }

        .additional-logos img {
            max-width: 150px;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="section">
            <p>Se encontro el siguiente error en el sitema:</p>
            <br>
            <p>{{$message}}</p>
            <br>
            <p>{{$stack}}</p>
            <br>
            <p>{{$plataforma}}</p>
            <br>
            <p>{{$usuarioError}}</p>
            <p><BR>¡Saludos cordiales!</p>
        </div>
        <div class="footer">
            <br>Este es un correo informativo únicamente, por favor no responder.
        </div>
    </div>
</body>

</html>
